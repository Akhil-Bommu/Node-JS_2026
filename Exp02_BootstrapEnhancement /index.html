<!DOCTYPE html> 
<!-- 
Week 2 – Experiment 2 
Bootstrap Enhanced Shopping Cart 
Home Page --> 
<html lang="en"> 
<head> 
<!-- Character Encoding --> 
<meta charset="UTF-8"> 
<!-- Viewport for Responsive Design --> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Shopping Cart - Bootstrap Home</title> 
<!-- Bootstrap 5 CSS CDN --> 
<!-- This loads Bootstrap styles from online CDN --> 
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
</head> 
<body> 
<!-- ================= NAVBAR ================= --> 
<!-- 
navbar-expand-lg → Expands menu in large screens 
navbar-dark bg-dark → Dark themed navbar --> 
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"> 
<div class="container"> 
<!-- Website Brand Name --> 
<a class="navbar-brand" href="#">MyShop</a> 
<!-- Mobile Toggle Button --> 
<button class="navbar-toggler" type="button"
  data-bs-toggle="collapse" 
data-bs-target="#navbarNav"> 
<span class="navbar-toggler-icon"></span> 
</button> 
<!-- Navigation Links --> 
<div class="collapse navbar-collapse" id="navbarNav"> 
<ul class="navbar-nav ms-auto"> 
<!-- ms-auto aligns items to right --> 
<li class="nav-item"><a class="nav-link active" 
href="index.html">Home</a></li> 
<li class="nav-item"><a class="nav-link" 
href="catalog.html">Catalog</a></li> 
<li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li> 
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li> 
<li class="nav-item"><a class="nav-link" 
href="register.html">Register</a></li> 
</ul> 
</div> 
</div> 
</nav> 
<!-- ================= HERO SECTION ================= --> 
<!-- 
container → Centers content 
text-center → Align text center 
mt-5 → Margin top spacing --> 
<div class="container text-center mt-5"> 
<h1 class="display-4">Welcome to MyShop</h1> 
<!-- lead class makes paragraph slightly larger --> 
<p class="lead">Enhanced using Bootstrap Framework</p> 
<!-- btn btn-warning → Bootstrap button styling --> 
<a href="catalog.html" class="btn btn-warning btn-lg"> 
Shop Now 
</a> 
</div> 
<!-- Bootstrap JavaScript Bundle --> 
<!-- Required for navbar toggle functionality --> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js
"></script> 
</body> 
</html>
