<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Product Catalog - Bootstrap</title>
    <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet"> 
</head> 
 
<body> 
 
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"> 
  <div class="container"> 
    <a class="navbar-brand" href="#">MyShop</a> 
  </div> 
</nav> 
 
<div class="container mt-5"> 
 
    <h2 class="text-center mb-4">Product Catalog</h2> 
 
    <!-- 
        row → Creates horizontal group 
        col-md-4 → 3 cards per row in medium screens 
    --> 
    <div class="row"> 
 
        <!-- Product 1 --> 
        <div class="col-md-4 mb-4"> 
            <div class="card shadow"> 
 
                <img src="images\Laptop_BackPack.jpg" 
                     class="card-img-top" 
                     alt="Product Image"> 
 
                <div class="card-body"> 
                    <h5 class="card-title">Product 1</h5> 
                    <p class="card-text">Price: ₹1000</p> 
                    <button class="btn btn-primary w-100"> 
                        Add to Cart 
                    </button> 
                </div> 
            </div> 
        </div> 
 
        <!-- Product 2 --> 
        <div class="col-md-4 mb-4"> 
            <div class="card shadow"> 
                <img src="images/smart_watch.jpg" 
                     class="card-img-top" 
                     alt="Product Image"> 
                <div class="card-body"> 
                    <h5 class="card-title">Product 2</h5> 
                    <p class="card-text">Price: ₹1500</p> 
                    <button class="btn btn-primary w-100"> 
                        Add to Cart
                      </button> 
</div> 
</div> 
</div> 
<!-- Product 3 --> 
<div class="col-md-4 mb-4"> 
<div class="card shadow"> 
<img src="images\Bluetooth_Speaker.png" 
class="card-img-top" 
alt="Product Image"> 
<div class="card-body"> 
<h5 class="card-title">Product 3</h5> 
<p class="card-text">Price: ₹2000</p> 
<button class="btn btn-primary w-100"> 
Add to Cart 
</button> 
</div> 
</div> 
</div> 
</div> 
</div> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js
"></script> 
</body> 
</html>
